<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婷婷生日快乐!!!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .music-control:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .music-control.muted {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
        }

        .music-control.muted:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 粒子星空背景 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 装饰元素容器 */
        #decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .falling-element {
            position: absolute;
            pointer-events: none;
            user-select: none;
            font-size: 24px;
            opacity: 0.6;
            will-change: transform, opacity;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .heart { color: #ff6b6b; }
        .sparkle { color: #ffd93d; }
        .balloon { color: #6c5ce7; }
        .confetti { color: #00b894; }
        .star { color: #fdcb6e; }

        /* 顶部祝福语 */
        .header {
            text-align: center;
            padding: 50px 20px 30px 20px; /* 减少底部内边距 */
            z-index: 10;
            position: relative;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: bold;
            animation: glow 2s ease-in-out infinite alternate, colorChange 3s linear infinite;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .header p {
            font-size: 1.5rem;
            animation: colorChange 4s linear infinite;
            display: inline-block;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.3);
        }

        /* 彩色文字动画 */
        .colorful-text {
            display: inline-block;
            font-weight: bold;
            background: linear-gradient(45deg,
            #ff6b6b, #ff9ff3, #f368e0,
            #6c5ce7, #667eea, #764ba2,
            #00b894, #00cec9, #74b9ff,
            #a29bfe, #fd79a8, #e84393
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 6s linear infinite;
        }

        .colorful-text-2 {
            display: inline-block;
            font-weight: bold;
            background: linear-gradient(45deg,
            #ffd93d, #ffed4e, #ff9ff3,
            #6c5ce7, #00b894, #fd79a8
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 4s linear infinite reverse;
        }

        .colorful-text-3 {
            display: inline-block;
            font-weight: bold;
            background: linear-gradient(45deg,
            #00b894, #00cec9, #74b9ff,
            #a29bfe, #fd79a8, #ff9ff3
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 5s linear infinite;
        }

        /* 底部祝福语 */
        .footer {
            text-align: center;
            padding: 20px; /* 减少内边距 */
            font-size: 1.2rem;
            z-index: 10;
            position: relative;
        }

        .footer p {
            animation: colorChange 3.5s linear infinite;
            margin-bottom: 10px;
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.2);
        }

        /* 动画关键帧 */
        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 30px rgba(255, 182, 193, 0.3);
            }
            to {
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 182, 193, 0.6);
            }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes colorChange {
            0% {
                color: #ff6b6b;
                filter: drop-shadow(0 0 5px #ff6b6b);
            }
            20% {
                color: #ffd93d;
                filter: drop-shadow(0 0 5px #ffd93d);
            }
            40% {
                color: #6c5ce7;
                filter: drop-shadow(0 0 5px #6c5ce7);
            }
            60% {
                color: #00b894;
                filter: drop-shadow(0 0 5px #00b894);
            }
            80% {
                color: #ff9ff3;
                filter: drop-shadow(0 0 5px #ff9ff3);
            }
            100% {
                color: #ff6b6b;
                filter: drop-shadow(0 0 5px #ff6b6b);
            }
        }

        @keyframes rainbow {
            0% {
                color: #ff6b6b;
                transform: scale(1);
            }
            16.6% {
                color: #ff9f43;
                transform: scale(1.05);
            }
            33.3% {
                color: #feca57;
                transform: scale(1.1);
            }
            50% {
                color: #1dd1a1;
                transform: scale(1.05);
            }
            66.6% {
                color: #54a0ff;
                transform: scale(1);
            }
            83.3% {
                color: #5f27cd;
                transform: scale(1.05);
            }
            100% {
                color: #ff6b6b;
                transform: scale(1);
            }
        }

        /* 蛋糕容器 */
        .cake-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh; /* 增加高度 */
            position: relative;
            z-index: 10;
        }

        /* 蛋糕样式 - 尺寸放大一倍 */
        .cake {
            position: relative;
            transform: scale(0.9); /* 从1.2增加到2.4 */
        }

        /* 蛋糕底层 - 尺寸放大一倍 */
        .cake-base {
            width: 600px; /* 从300px增加到600px */
            height: 240px; /* 从120px增加到240px */
            background: linear-gradient(to bottom, #ff6b6b, #ff8e8e);
            border-radius: 40px; /* 从20px增加到40px */
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4); /* 阴影增强 */
        }

        /* 蛋糕中层 - 尺寸放大一倍 */
        .cake-middle {
            width: 560px; /* 从280px增加到560px */
            height: 200px; /* 从100px增加到200px */
            background: linear-gradient(to bottom, #ffd93d, #ffed4e);
            border-radius: 30px; /* 从15px增加到30px */
            position: absolute;
            top: -80px; /* 从-40px增加到-80px */
            left: 20px; /* 从10px增加到20px */
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.3); /* 阴影增强 */
        }

        /* 蛋糕顶层 - 尺寸放大一倍 */
        .cake-top {
            width: 520px; /* 从260px增加到520px */
            height: 160px; /* 从80px增加到160px */
            background: linear-gradient(to bottom, #ff9ff3, #f368e0);
            border-radius: 24px; /* 从12px增加到24px */
            position: absolute;
            top: -140px; /* 从-70px增加到-140px */
            left: 40px; /* 从20px增加到40px */
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3); /* 阴影增强 */
        }

        /* 巧克力酱装饰 - 尺寸对应放大 */
        .chocolate-drip {
            position: absolute;
            top: -20px; /* 从-10px增加到-20px */
            left: 0;
            right: 0;
            height: 40px; /* 从20px增加到40px */
            background: linear-gradient(45deg, transparent 30%, #8B4513 50%, transparent 70%);
            animation: drip 3s ease-in-out infinite;
        }

        .chocolate-drip::before,
        .chocolate-drip::after {
            content: '';
            position: absolute;
            top: 0;
            width: 60px; /* 从30px增加到60px */
            height: 40px; /* 从20px增加到40px */
            background: linear-gradient(45deg, transparent 30%, #8B4513 50%, transparent 70%);
            animation: drip 3s ease-in-out infinite reverse;
        }

        .chocolate-drip::before {
            left: 100px; /* 从50px增加到100px */
            animation-delay: -1s;
        }

        .chocolate-drip::after {
            right: 100px; /* 从50px增加到100px */
            animation-delay: -2s;
        }

        @keyframes drip {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); } /* 从5px增加到10px */
        }

        /* 蜡烛 - 尺寸放大一倍 */
        .candles {
            position: absolute;
            top: -240px; /* 从-120px增加到-240px */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px; /* 从15px增加到30px */
        }

        .candle {
            width: 16px; /* 从8px增加到16px */
            height: 80px; /* 从40px增加到80px */
            background: linear-gradient(to bottom, #fff, #f0f0f0);
            border-radius: 8px; /* 从4px增加到8px */
            position: relative;
            animation: flicker 1.5s ease-in-out infinite alternate;
        }

        .candle:nth-child(1) { animation-delay: 0s; }
        .candle:nth-child(2) { animation-delay: 0.3s; }
        .candle:nth-child(3) { animation-delay: 0.6s; }
        .candle:nth-child(4) { animation-delay: 0.9s; }
        .candle:nth-child(5) { animation-delay: 1.2s; }

        .flame {
            position: absolute;
            top: -24px; /* 从-12px增加到-24px */
            left: 50%;
            transform: translateX(-50%);
            width: 16px; /* 从8px增加到16px */
            height: 24px; /* 从12px增加到24px */
            background: radial-gradient(circle, #ff6b35, #ff4757);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flame-dance 1s ease-in-out infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1); }
        }

        @keyframes flame-dance {
            0% { transform: translateX(-50%) rotate(-2deg); }
            100% { transform: translateX(-50%) rotate(2deg); }
        }

        /* 肖像照片 - 尺寸放大一倍 */
        .photo-frame {
            position: absolute;
            top: -80px; /* 从-40px增加到-80px */
            left: 50%;
            transform: translateX(-50%);
            width: 160px; /* 从80px增加到160px */
            height: 160px; /* 从80px增加到160px */
            border-radius: 50%;
            border: 8px solid #fff; /* 从4px增加到8px */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); /* 阴影增强 */
            overflow: hidden;
            z-index: 10;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .photo-frame:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 16px 60px rgba(0, 0, 0, 0.6);
        }

        .photo-frame:active {
            transform: translateX(-50%) scale(0.95);
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff9ff3, #f368e0);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px; /* 从12px增加到24px */
            text-align: center;
        }

        /* 照片旋转动画 */
        .photo-frame.rotating {
            animation: rotateSlow 20s linear infinite;
        }

        .photo-frame.paused {
            animation-play-state: paused;
        }

        @keyframes rotateSlow {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(-360deg); }
        }

        /* 生日祝福短语 */
        .blessing-phrases {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .blessing-phrase {
            font-size: 1.2rem;
            padding: 8px 20px;
            border-radius: 20px;
            animation: rainbow 3s ease-in-out infinite;
            font-weight: bold;
            display: inline-block;
        }

        .blessing-phrase:nth-child(1) { animation-delay: 0s; }
        .blessing-phrase:nth-child(2) { animation-delay: 0.5s; }
        .blessing-phrase:nth-child(3) { animation-delay: 1s; }
        .blessing-phrase:nth-child(4) { animation-delay: 1.5s; }
        .blessing-phrase:nth-child(5) { animation-delay: 2s; }

        /* 生日图标装饰 */
        .birthday-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .birthday-icon {
            font-size: 2rem;
            animation: rainbow 4s ease-in-out infinite;
        }

        .birthday-icon:nth-child(1) { animation-delay: 0s; }
        .birthday-icon:nth-child(2) { animation-delay: 0.8s; }
        .birthday-icon:nth-child(3) { animation-delay: 1.6s; }
        .birthday-icon:nth-child(4) { animation-delay: 2.4s; }
        .birthday-icon:nth-child(5) { animation-delay: 3.2s; }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }

            .header p {
                font-size: 1.2rem;
            }

            /* 移动端蛋糕缩小 */
            .cake {
                transform: scale(1.8); /* 移动端缩小一些 */
            }

            .cake-base {
                width: 300px;
                height: 120px;
            }

            .cake-middle {
                width: 280px;
                height: 100px;
                top: -40px;
                left: 10px;
            }

            .cake-top {
                width: 260px;
                height: 80px;
                top: -70px;
                left: 20px;
            }

            .candles {
                top: -120px;
                gap: 15px;
            }

            .candle {
                width: 8px;
                height: 40px;
            }

            .flame {
                width: 8px;
                height: 12px;
                top: -12px;
            }

            .photo-frame {
                width: 80px;
                height: 80px;
                top: -40px;
                border-width: 4px;
            }

            .photo-placeholder {
                font-size: 12px;
            }

            .chocolate-drip {
                height: 20px;
                top: -10px;
            }

            .chocolate-drip::before,
            .chocolate-drip::after {
                width: 30px;
                height: 20px;
            }

            .chocolate-drip::before {
                left: 50px;
            }

            .chocolate-drip::after {
                right: 50px;
            }

            .music-control {
                width: 40px;
                height: 40px;
                font-size: 20px;
                top: 10px;
                right: 10px;
            }

            .blessing-phrase {
                font-size: 1rem;
            }

            .birthday-icon {
                font-size: 1.5rem;
            }
        }

        /* 特别针对小屏幕的调整 */
        @media (max-width: 480px) {
            .cake {
                transform: scale(1.4);
            }

            .cake-base {
                width: 250px;
                height: 100px;
            }

            .cake-middle {
                width: 230px;
                height: 80px;
                top: -35px;
                left: 10px;
            }

            .cake-top {
                width: 210px;
                height: 60px;
                top: -55px;
                left: 20px;
            }
        }
    </style>
</head>
<body>
<!-- 音乐控制按钮 -->
<div class="music-control" id="musicControl" title="点击播放/暂停音乐">
    <span id="musicIcon">🎵</span>
</div>

<!-- 背景音乐 -->
<audio id="backgroundMusic"  src="./media/happy.mp3"  type="audio/mpeg" loop>
    <!-- 这里可以替换为你的生日音乐文件 -->

    <!-- 如果暂时没有音乐文件，可以使用在线音乐或移除这个元素 -->
</audio>

<!-- 粒子星空背景 -->
<canvas id="particles-canvas"></canvas>

<!-- 装饰元素容器 -->
<div id="decorations"></div>

<!-- 顶部祝福语 -->
<div class="header">
    <h1 class="colorful-text">婷婷生日快乐！</h1>
    <p>
        23岁的你
        <span class="colorful-text-2">美丽动人</span>，
        愿
        <span class="colorful-text-3">幸福永远</span>
        伴随你 💖
    </p>

    <!-- 生日祝福短语 -->
    <div class="blessing-phrases">
        <div class="blessing-phrase">🎀 祝你青春永驻，笑口常开 🎀</div>
        <div class="blessing-phrase">✨ 愿你的每一天都充满阳光 ✨</div>
        <div class="blessing-phrase">❤️ 23岁生日快乐!!! ❤️</div>
        <div class="blessing-phrase">🎁 愿所有美好都如期而至 🎁</div>
        <div class="blessing-phrase">💫 你是我的星辰大海 💫</div>
    </div>
</div>

<!-- 蛋糕容器 -->
<div class="cake-container">
    <div class="cake">
        <!-- 蛋糕层 -->
        <div class="cake-base">
            <div class="chocolate-drip"></div>
        </div>
        <div class="cake-middle"></div>
        <div class="cake-top"></div>

        <!-- 肖像照片 -->
        <div class="photo-frame rotating" id="photoFrame" title="点击暂停/继续旋转">
            <div class="photo-placeholder">
                婷婷照片
                <!-- 这里替换为真实的照片 -->
                 <img src="./media/tingting.jpg" alt="婷婷" style="width:100%;height:100%;object-fit:cover;">
            </div>
        </div>

        <!-- 蜡烛 -->
        <div class="candles">
            <div class="candle">
                <div class="flame"></div>
            </div>
            <div class="candle">
                <div class="flame"></div>
            </div>
            <div class="candle">
                <div class="flame"></div>
            </div>
            <div class="candle">
                <div class="flame"></div>
            </div>
            <div class="candle">
                <div class="flame"></div>
            </div>
        </div>
    </div>
</div>

<!-- 底部祝福 -->
<div class="footer">
    <p class="colorful-text">愿你的23岁充满欢笑与爱 ❤️</p>

    <!-- 生日图标装饰 -->
    <div class="birthday-icons">
        <div class="birthday-icon">🎂</div>
        <div class="birthday-icon">🎈</div>
        <div class="birthday-icon">🎉</div>
        <div class="birthday-icon">🎁</div>
        <div class="birthday-icon">✨</div>
    </div>

    <div style="margin-top: 20px;">
        <span class="colorful-text-2">生日快乐！</span>
        <span style="font-size: 1.5rem; margin: 0 10px;" class="colorful-text-3">🎂</span>
        <span class="colorful-text-2">天天开心！</span>
    </div>
</div>

<script>
    // 初始化变量
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    const decorationsContainer = document.getElementById('decorations');
    const photoFrame = document.getElementById('photoFrame');
    const backgroundMusic = document.getElementById('backgroundMusic');
    const musicControl = document.getElementById('musicControl');
    const musicIcon = document.getElementById('musicIcon');

    // 音乐控制状态
    let isMusicPlaying = false;
    let isMusicMuted = false;

    // 祝福短语数组
    const blessingPhrases = [
        "🎀 祝你青春永驻，笑口常开 🎀",
        "✨ 愿你的每一天都充满阳光 ✨",
        "❤️ 23岁生日快乐!!! ❤️",
        "🎁 愿所有美好都如期而至 🎁",
        "💫 你是星辰大海，你是日月光辉 💫",
        "🌸 愿岁月温柔待你 🌸",
        "🎯 23岁，新的旅程，新的精彩 🎯",
        "💕 幸福今天明天每一天 💕",
        "🌟 你是最闪亮的星星 🌟",
        "🥂 为你的23岁干杯 🥂"
    ];

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 80;
    const fallingElements = [];
    let lastFrameTime = 0;
    const FRAME_INTERVAL = 16;

    // 装饰元素数组
    const elementTypes = [
        { emoji: '💕', class: 'heart', size: 20 },
        { emoji: '💖', class: 'heart', size: 24 },
        { emoji: '💗', class: 'heart', size: 22 },
        { emoji: '❤️', class: 'heart', size: 28 },
        { emoji: '💘', class: 'heart', size: 26 },
        { emoji: '🎉', class: 'sparkle', size: 30 },
        { emoji: '🎈', class: 'balloon', size: 25 },
        { emoji: '✨', class: 'sparkle', size: 20 },
        { emoji: '🎀', class: 'confetti', size: 22 },
        { emoji: '⭐', class: 'star', size: 28 }
    ];

    // 页面加载完成后初始化音乐
    window.addEventListener('load', () => {
        // 自动播放音乐
        playMusic();

        // 设置音乐音量
        backgroundMusic.volume = 0.5;

        // 自动旋转照片
        photoFrame.classList.add('rotating');

        // 随机显示祝福短语
        updateBlessingPhrases();
    });

    // 更新祝福短语
    function updateBlessingPhrases() {
        const phrasesContainer = document.querySelector('.blessing-phrases');
        if (!phrasesContainer) return;

        // 随机打乱数组
        const shuffledPhrases = [...blessingPhrases]
            .sort(() => Math.random() - 0.5)
            .slice(0, 5);

        // 清空现有短语
        phrasesContainer.innerHTML = '';

        // 添加新短语
        shuffledPhrases.forEach((phrase, index) => {
            const phraseElement = document.createElement('div');
            phraseElement.className = 'blessing-phrase';
            phraseElement.textContent = phrase;
            phraseElement.style.animationDelay = `${index * 0.5}s`;
            phrasesContainer.appendChild(phraseElement);
        });
    }

    // 播放音乐函数
    function playMusic() {
        if (backgroundMusic.src) {
            backgroundMusic.play().then(() => {
                isMusicPlaying = true;
                updateMusicControls();
            }).catch(error => {
                console.log('自动播放被阻止，需要用户交互', error);
                musicControl.title = '点击播放音乐';
                musicIcon.textContent = '▶️';
            });
        } else {
            console.log('未设置音乐文件');
            isMusicPlaying = false;
            isMusicMuted = true;
            updateMusicControls();
        }
    }

    // 暂停音乐函数
    function pauseMusic() {
        backgroundMusic.pause();
        isMusicPlaying = false;
        updateMusicControls();
    }

    // 更新音乐控制界面
    function updateMusicControls() {
        if (isMusicMuted || !backgroundMusic.src) {
            musicIcon.textContent = '🔇';
            musicControl.classList.add('muted');
            musicControl.title = '点击播放音乐';
        } else if (isMusicPlaying) {
            musicIcon.textContent = '🎵';
            musicControl.classList.remove('muted');
            musicControl.title = '点击暂停音乐';
        } else {
            musicIcon.textContent = '▶️';
            musicControl.classList.remove('muted');
            musicControl.title = '点击播放音乐';
        }
    }

    // 音乐控制按钮点击事件
    musicControl.addEventListener('click', (e) => {
        e.stopPropagation();

        if (!backgroundMusic.src) {
            alert('请在代码中设置音乐文件路径\n在<audio>标签中添加：\n<source src="你的音乐文件.mp3" type="audio/mpeg">');
            return;
        }

        if (isMusicMuted) {
            isMusicMuted = false;
            backgroundMusic.volume = 0.5;
            playMusic();
        } else if (isMusicPlaying) {
            pauseMusic();
        } else {
            playMusic();
        }
    });

    // 照片点击事件
    photoFrame.addEventListener('click', (e) => {
        e.stopPropagation();

        if (!backgroundMusic.src) {
            alert('请在代码中设置音乐文件路径\n在<audio>标签中添加：\n<source src="你的音乐文件.mp3" type="audio/mpeg">');
            return;
        }

        if (isMusicPlaying) {
            pauseMusic();
            photoFrame.classList.add('paused');
        } else {
            playMusic();
            photoFrame.classList.remove('paused');
        }
    });

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.3;
            this.size = Math.random() * 1.5 + 0.5;
            this.opacity = Math.random() * 0.5 + 0.1;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            if (this.x < 0 || this.x > canvas.width) this.vx *= -0.95;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -0.95;

            this.opacity = Math.max(0.1, Math.min(0.3, this.opacity));
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.fill();
        }
    }

    class FallingElement {
        constructor() {
            this.type = elementTypes[Math.floor(Math.random() * elementTypes.length)];
            this.x = Math.random() * canvas.width;
            this.y = -Math.random() * 100;
            this.size = Math.random() * 0.5 + 0.5;
            this.opacity = Math.random() * 0.4 + 0.2;
            this.speed = Math.random() * 1.5 + 0.8;
            this.rotation = Math.random() * 360;
            this.rotationSpeed = (Math.random() - 0.5) * 0.5;
            this.swing = Math.random() * Math.PI * 2;
            this.swingSpeed = Math.random() * 0.02 + 0.01;
            this.swingAmplitude = Math.random() * 15 + 5;
            this.lastUpdate = 0;
            this.element = this.createElement();
        }

        createElement() {
            const element = document.createElement('div');
            element.className = `falling-element ${this.type.class}`;
            element.innerHTML = this.type.emoji;
            element.style.fontSize = `${this.type.size * this.size}px`;
            element.style.left = `${this.x}px`;
            element.style.top = `${this.y}px`;
            element.style.opacity = this.opacity;
            element.style.transform = `rotate(${this.rotation}deg)`;
            decorationsContainer.appendChild(element);
            return element;
        }

        update(currentTime) {
            if (currentTime - this.lastUpdate < 16) return true;
            this.lastUpdate = currentTime;

            this.y += this.speed;
            this.rotation += this.rotationSpeed;
            this.swing += this.swingSpeed;

            const swingX = Math.sin(this.swing) * this.swingAmplitude;

            this.element.style.left = `${this.x + swingX}px`;
            this.element.style.top = `${this.y}px`;
            this.element.style.transform = `rotate(${this.rotation}deg)`;

            return this.y < canvas.height + 100;
        }

        remove() {
            if (this.element && this.element.parentNode) {
                this.element.parentNode.removeChild(this.element);
            }
        }
    }

    // 初始化粒子
    for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
    }

    // 创建新元素
    function createFallingElement() {
        if (fallingElements.length < 25) {
            fallingElements.push(new FallingElement());
        }
    }

    // 动画循环
    function animate(currentTime) {
        if (currentTime - lastFrameTime < FRAME_INTERVAL) {
            requestAnimationFrame(animate);
            return;
        }
        lastFrameTime = currentTime;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(particle => {
            particle.update();
            particle.draw();
        });

        for (let i = fallingElements.length - 1; i >= 0; i--) {
            if (!fallingElements[i].update(currentTime)) {
                fallingElements[i].remove();
                fallingElements.splice(i, 1);
            }
        }

        if (Math.random() < 0.08) {
            createFallingElement();
        }

        requestAnimationFrame(animate);
    }

    // 初始创建元素
    for (let i = 0; i < 8; i++) {
        setTimeout(() => createFallingElement(), i * 300);
    }

    animate(0);

    // 窗口大小调整
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            fallingElements.forEach(element => {
                element.remove();
            });
            fallingElements.length = 0;

            particles.length = 0;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            for (let i = 0; i < 8; i++) {
                setTimeout(() => createFallingElement(), i * 300);
            }
        }, 100);
    });

    // 点击页面增加更多元素
    let clickCooldown = 0;
    document.addEventListener('click', (e) => {
        const now = Date.now();
        if (now - clickCooldown < 500) return;
        clickCooldown = now;

        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                const element = new FallingElement();
                element.x = e.clientX + Math.random() * 60 - 30;
                element.y = e.clientY;
                fallingElements.push(element);
            }, i * 200);
        }
    });

    // 定期更新祝福短语
    setInterval(() => {
        updateBlessingPhrases();
    }, 10000);

    // 键盘控制
    let keyCooldown = 0;
    document.addEventListener('keydown', (e) => {
        const now = Date.now();

        if (e.key === ' ' && now - keyCooldown > 1000) {
            keyCooldown = now;
            for (let i = 0; i < 5; i++) {
                createFallingElement();
            }
        } else if (e.key === 'Escape') {
            fallingElements.forEach(element => element.remove());
            fallingElements.length = 0;
        } else if (e.key === 'm' || e.key === 'M') {
            musicControl.click();
        } else if (e.key === 'p' || e.key === 'P') {
            photoFrame.click();
        } else if (e.key === 'b' || e.key === 'B') {
            // 按B键更新祝福短语
            updateBlessingPhrases();
        }
    });

    console.log('🎵 音乐控制：点击右上角音符按钮或照片控制音乐');
    console.log('🎵 快捷键：M键控制音乐，P键控制照片旋转，B键更新祝福语');
</script>
</body>
</html>
